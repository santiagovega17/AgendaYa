name: Pipeline de CI

# Se dispara en PRs hacia main, en cada push a main y manualmente desde Actions
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Correr pruebas unitarias
        run: npm run test

      - name: Construir proyecto (build)
        run: npm run build
