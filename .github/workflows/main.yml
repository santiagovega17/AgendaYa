name: Pipeline de CI

# Se dispara al abrir un PR y cada vez que se actualiza el branch del PR (evento synchronize)
on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependencias
        run: npm ci

      - name: Correr pruebas unitarias
        run: npm run test

      - name: Construir proyecto (build)
        run: npm run build
